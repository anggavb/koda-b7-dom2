<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitask 4</title>

    <link rel="stylesheet" href="css/minitask-4.css">
    <script src="js/minitask-4.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>
                    <a href="#">Home</a>
                </li>
                <li>
                    <a href="#">About</a>
                </li>
                <li>
                    <a href="#">Login</a>
                </li>
                <li>
                    <a href="#">Logout</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <form method="post">
            <div class="form-control">
                <label for="username">Username</label>
                <input type="text" name="username" id="username">
            </div>
            <div class="form-control">
                <label for="password">Password</label>
                <input type="text" name="password" id="password">
            </div>
            <div class="form-control">
                <button type="submit">Login</button>
            </div>
        </form>
    </main>
</body>
</html>
